<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Sign in · Mojmar</title>
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; margin: 0; }
    body {
      font-family: system-ui, -apple-system, sans-serif;
      background: #0f0f15; color: #e8e8ed;
      min-height: 100vh; display: grid; place-items: center; padding: 24px;
    }
    .card {
      width: 100%; max-width: 360px; background: #16161f;
      border: 1px solid rgba(255,255,255,.08); border-radius: 14px;
      padding: 32px 28px; text-align: center;
    }
    .brand { font-size: 22px; font-weight: 700; letter-spacing: .3px; }
    .sub { color: #9d9daa; font-size: 13px; margin-top: 6px; }
    #status { color: #9d9daa; font-size: 13px; margin: 22px 0; min-height: 18px; }
    button {
      width: 100%; display: inline-flex; align-items: center; justify-content: center; gap: 10px;
      padding: 11px 14px; border-radius: 10px; border: 1px solid rgba(255,255,255,.14);
      background: #fff; color: #1a1a1a; font-size: 14px; font-weight: 600; cursor: pointer;
    }
    button:hover { filter: brightness(.97); }
    button[hidden] { display: none; }
    .g { width: 18px; height: 18px; }
  </style>
</head>
<body>
  <div class="card">
    <div class="brand">Mojmar</div>
    <div class="sub">Your interview copilot</div>
    <div id="status">Checking session…</div>
    <button id="google" hidden>
      <svg class="g" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.5 0 6.6 1.2 9 3.6l6.7-6.7C35.9 2.4 30.4 0 24 0 14.6 0 6.4 5.4 2.5 13.2l7.9 6.1C12.3 13.2 17.7 9.5 24 9.5z"/><path fill="#4285F4" d="M46.5 24.5c0-1.6-.1-3.1-.4-4.5H24v9h12.7c-.5 3-2.2 5.5-4.7 7.2l7.3 5.7C43.7 37.9 46.5 31.8 46.5 24.5z"/><path fill="#FBBC05" d="M10.4 28.3c-.5-1.5-.8-3.1-.8-4.8s.3-3.3.8-4.8l-7.9-6.1C.9 15.9 0 19.8 0 23.5s.9 7.6 2.5 10.9l7.9-6.1z"/><path fill="#34A853" d="M24 47c6.4 0 11.9-2.1 15.8-5.8l-7.3-5.7c-2 1.4-4.7 2.3-8.5 2.3-6.3 0-11.7-3.7-13.6-9.8l-7.9 6.1C6.4 42.6 14.6 47 24 47z"/></svg>
      Continue with Google
    </button>
    <button id="signout" hidden style="background:transparent;color:#9d9daa;border-color:rgba(255,255,255,.14);margin-top:10px">Sign out</button>
  </div>

  <script type="module">
    import { createClient } from 'https://esm.sh/@supabase/supabase-js@2';

    const SUPABASE_URL = 'https://dwlzelvxgtpttlfuhhbe.supabase.co';
    const SUPABASE_KEY = 'sb_publishable_MEQhpsJOaVgg_Gy8H5YwtA_pX_EDhUp';
    // Stateless auth broker: DON'T persist or auto-refresh. The desktop app is the sole
    // session owner. Persisting here caused a second sign-in to relay a stale/rotated
    // token (two clients refreshing the same family) → "Auth session missing" in the app.
    // Now every app sign-in is a fresh OAuth → fresh tokens.
    const supabase = createClient(SUPABASE_URL, SUPABASE_KEY, {
      auth: { detectSessionInUrl: true, persistSession: false, autoRefreshToken: false, flowType: 'implicit' }
    });

    const params = new URLSearchParams(location.search);
    const fromApp = params.get('app') === '1';   // opened by the desktop app
    const statusEl = document.getElementById('status');
    const btn = document.getElementById('google');
    const outBtn = document.getElementById('signout');

    function relay(session) {
      const at = encodeURIComponent(session.access_token);
      const rt = encodeURIComponent(session.refresh_token);
      statusEl.textContent = 'Signed in ✓  — returning to Mojmar…';
      // Deep link back into the desktop app (no localhost → no PNA/mixed-content block).
      location.href = `mojmar://auth?at=${at}&rt=${rt}`;
    }

    // When actually authenticating, always show Google's account chooser (even for a
    // single account) so the user sees/confirms which account. The seamless case
    // (an existing Mojmar session) never reaches here — it relays without OAuth.
    function startOAuth(redirectTo) {
      statusEl.textContent = 'Opening Google…';
      supabase.auth.signInWithOAuth({
        provider: 'google',
        options: { redirectTo, queryParams: { prompt: 'select_account' } },
      });
    }

    async function init() {
      if (location.protocol === 'file:') {
        statusEl.innerHTML = 'Open <b>http://localhost:5500</b> in your browser —<br>don\'t open this file directly.';
        return;
      }
      const cameBack = params.get('cb') === '1';
      const { data: { session } } = await supabase.auth.getSession();

      if (fromApp) {
        // Opened from the app: already signed in → relay straight away (seamless).
        if (session) { relay(session); return; }
        // Not signed in yet → Google (chooser/login only when actually needed).
        if (cameBack) { statusEl.textContent = 'Sign in to continue.'; btn.hidden = false; return; }
        startOAuth(`${location.origin}${location.pathname}?app=1&cb=1`);
        return;
      }

      // Opened manually in a browser (no port) — for testing.
      if (session) {
        statusEl.textContent = 'Signed in as ' + (session.user.email || 'your account');
        outBtn.hidden = false;
        return;
      }
      statusEl.textContent = 'Sign in to continue.';
      btn.hidden = false;
    }

    outBtn.onclick = async () => {
      outBtn.disabled = true;
      await supabase.auth.signOut({ scope: 'local' });
      location.href = location.origin + location.pathname;
    };

    btn.onclick = () => { btn.disabled = true; startOAuth(location.origin + location.pathname); };

    init();
  </script>
</body>
</html>
