# DigitalOcean App Platform — Mojmar is deployed as TWO separate apps, each at its
# own root domain (no path-prefix juggling; App Platform has no preserve_path_prefix).
# Live:
#   backend  → https://mojmar-backend-qxnct.ondigitalocean.app   (/generate /heartbeat /balance /health)
#   web-auth → https://mojmar-web-h2ml2.ondigitalocean.app       (Google OAuth relay page)
# Apps were created via the DO API (scratchpad/deploy.js) with secrets injected from
# backend/.env at deploy time. This file documents the shape; it is not auto-applied.
# Secrets (SUPABASE_SERVICE_ROLE_KEY, OPENROUTER_KEY) are set as SECRET envs, never here.
---
# App 1: mojmar-backend
name: mojmar-backend
region: blr
services:
  - name: backend
    git:
      repo_clone_url: https://github.com/voldemort9999/mojmar-server.git
      branch: main
    source_dir: /backend
    run_command: node server.js
    environment_slug: node-js
    instance_size_slug: apps-s-1vcpu-0.5gb
    instance_count: 1
    http_port: 8787
    routes:
      - path: /
    envs:
      - key: SUPABASE_URL
        scope: RUN_TIME
        value: "https://dwlzelvxgtpttlfuhhbe.supabase.co"
      - key: SUPABASE_SERVICE_ROLE_KEY
        scope: RUN_TIME
        type: SECRET
      - key: OPENROUTER_KEY
        scope: RUN_TIME
        type: SECRET
---
# App 2: mojmar-web
name: mojmar-web
region: blr
static_sites:
  - name: web-auth
    git:
      repo_clone_url: https://github.com/voldemort9999/mojmar-server.git
      branch: main
    source_dir: /web-auth
    catchall_document: index.html
    routes:
      - path: /
